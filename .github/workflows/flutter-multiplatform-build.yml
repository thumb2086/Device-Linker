name: Release Flutter Multi-Platform

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            flutter_platforms: android
            build_command: flutter build apk --release
            package_path: flutter_app/build/release/flutter-android.apk
          - platform: ios
            os: macos-latest
            flutter_platforms: ios
            build_command: flutter build ios --release --no-codesign
            package_path: flutter_app/build/release/flutter-ios.zip
          - platform: web
            os: ubuntu-latest
            flutter_platforms: web
            build_command: flutter build web --release
            package_path: flutter_app/build/release/flutter-web.zip
          - platform: linux
            os: ubuntu-latest
            flutter_platforms: linux
            build_command: flutter build linux --release
            package_path: flutter_app/build/release/flutter-linux.zip
          - platform: windows
            os: windows-latest
            flutter_platforms: windows
            build_command: flutter build windows --release
            package_path: flutter_app/build/release/flutter-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java (for Android build)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Initialize Flutter project for target platform
        working-directory: flutter_app
        run: flutter create . --project-name device_linker_flutter --org com.devicelinker --platforms=${{ matrix.flutter_platforms }}

      - name: Enable Android desugaring for flutter_local_notifications
        if: matrix.platform == 'android'
        working-directory: flutter_app
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' android/app/build.gradle.kts
            sed -i '/dependencies {/a\    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' android/app/build.gradle
            sed -i '/dependencies {/a\    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"' android/app/build.gradle
          else
            echo "Android app build file not found"
            exit 1
          fi

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - name: Test
        working-directory: flutter_app
        run: flutter test

      - name: Build ${{ matrix.platform }}
        working-directory: flutter_app
        run: ${{ matrix.build_command }}

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "flutter_app/build/release" | Out-Null

          switch ("${{ matrix.platform }}") {
            "android" {
              $apk = Get-ChildItem -Path "flutter_app/build/app/outputs/flutter-apk" -Filter "*.apk" | Select-Object -First 1
              if (-not $apk) { throw "Android APK not found" }
              Copy-Item $apk.FullName "flutter_app/build/release/flutter-android.apk" -Force
            }
            "ios" {
              if (-not (Test-Path "flutter_app/build/ios/iphoneos/Runner.app")) { throw "iOS Runner.app not found" }
              Compress-Archive -Path "flutter_app/build/ios/iphoneos/Runner.app" -DestinationPath "flutter_app/build/release/flutter-ios.zip" -Force
            }
            "web" {
              if (-not (Test-Path "flutter_app/build/web")) { throw "Web build folder not found" }
              Compress-Archive -Path "flutter_app/build/web/*" -DestinationPath "flutter_app/build/release/flutter-web.zip" -Force
            }
            "linux" {
              if (-not (Test-Path "flutter_app/build/linux/x64/release/bundle")) { throw "Linux bundle not found" }
              Compress-Archive -Path "flutter_app/build/linux/x64/release/bundle/*" -DestinationPath "flutter_app/build/release/flutter-linux.zip" -Force
            }
            "windows" {
              if (-not (Test-Path "flutter_app/build/windows/x64/runner/Release")) { throw "Windows release folder not found" }
              Compress-Archive -Path "flutter_app/build/windows/x64/runner/Release/*" -DestinationPath "flutter_app/build/release/flutter-windows.zip" -Force
            }
            default {
              throw "Unsupported platform: ${{ matrix.platform }}"
            }
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ matrix.platform }}
          path: ${{ matrix.package_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
